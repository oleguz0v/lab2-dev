version: '3.8'

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: recordings
      POSTGRES_USER: recordings_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recordings_user -d recordings"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data

  system:
    image: system
    build:
      context: .
      dockerfile: Dockerfile.system
    environment:
      DBUSER: recordings_user
      DBPASS_FILE: /run/secrets/db_password
      DBNAME: recordings
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy

  builder:
    image: builder
    build:
      context: .
      dockerfile: Dockerfile.build
    depends_on:
      - system

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      DBUSER: recordings_user
      DBPASS_FILE: /run/secrets/db_password
      DBNAME: recordings
      DATABASE_URL: postgres://recordings_user:$$(cat /run/secrets/db_password)@db:5432/recordings
    secrets:
      - db_password
    depends_on:
      builder:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DBUSER: recordings_user
      DBPASS_FILE: /run/secrets/db_password
      DBNAME: recordings
    volumes:
      - ./migrations:/migrations
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

secrets:
  db_password:
    file: db_password